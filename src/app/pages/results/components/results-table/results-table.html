<div class="results-wrapper fade-in">
  <p-table [value]="athletes()" styleClass="results-table">

    <ng-template pTemplate="header">
      <tr>
        @for (col of columns; track col.field) {
          <th>{{ col.header }}</th>
        }
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-athlete let-rowIndex="rowIndex">
      <tr [ngClass]="rowHighlightClass(rowIndex)">
        <td>{{ athlete.position }}</td>
        <td class="sticky-column">{{ athlete.name }}</td>

        @for (event of athlete.eventPoints; track event.name) {
          <td>{{ event.points }}</td>
        }
      </tr>
    </ng-template>

  </p-table>
</div>
