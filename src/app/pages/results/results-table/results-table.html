<div class="table-scroll-wrapper">
  <p-table [value]="athletes()" [scrollable]="true" scrollHeight="flex" styleClass="results-p-table">
    <ng-template pTemplate="header">
      <tr>
        @for (col of columns; track $index) {
        <th>{{ col.header }}</th>
        }
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-athlete let-rowIndex="rowIndex">
      <tr [ngClass]="rowHighlightClass(rowIndex)">
        <td>{{ athlete.position }}</td>
        <td>{{ athlete.name }}</td>
        @for (modality of athlete.modalityPoints; track $index) {
        <td>{{ modality.points }}</td>
        }
      </tr>
    </ng-template>
  </p-table>
</div>
