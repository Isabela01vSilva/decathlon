<div class="container">
  <p class="title">{{ title }}</p>
  <p class="conteudo">{{ bio }}</p>

  <div class="chips">
    <ng-content></ng-content>
  </div>

  <a [href]="url" [target]="url.startsWith('mailto:') ? '_self' : '_blank'"
    [rel]="url.startsWith('mailto:') ? null : 'noopener noreferrer'" class="contact-link">
    <i class="pi pi-github"></i>
    <span>Ver no Github</span>
  </a>

</div>
